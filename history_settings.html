<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>历史记录配置</title>
    <style>
      :root {
        --border: rgba(0,0,0,.08);
        --text: #1f2a37;
        --subtle: #6b7280;
        --radius: 12px;
        --primary: #3b82f6;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Inter", system-ui, -apple-system, "PingFang SC", "Segoe UI", Roboto, Arial, sans-serif;
        color: var(--text);
        background: transparent;
      }
      .wrap { display: flex; flex-direction: column; height: 100vh; }
      .header {
        padding: 12px 12px 10px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: rgba(255,255,255,.92);
        backdrop-filter: blur(6px);
      }
      .title { font-weight: 700; }
      .content { padding: 12px; display: grid; gap: 12px; overflow: auto; }
      .row { display: grid; gap: 6px; }
      .label { font-size: 13px; color: var(--subtle); }
      .switch {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        user-select: none;
      }
      .switch input { width: 36px; height: 20px; }
      textarea {
        width: 100%;
        min-height: 220px;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 10px 12px;
        font-size: 13px;
        resize: vertical;
      }
      .actions { display: flex; gap: 8px; }
      .btn {
        border: 1px solid var(--border);
        background: #fff;
        border-radius: 10px;
        padding: 8px 12px;
        font-weight: 600;
        cursor: pointer;
      }
      .btn.primary {
        background: var(--primary);
        color: #fff;
        border-color: transparent;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="header">
        <div class="title">历史记录配置</div>
        <div class="actions">
          <button id="close-panel" class="btn">关闭</button>
          <button id="save" class="btn primary">保存并返回</button>
        </div>
      </div>
      <div class="content">
        <div class="row">
          <div class="label">是否开启黑名单</div>
          <label class="switch">
            <input id="enabled" type="checkbox" />
            <span>开启后，满足任一屏蔽条件的记录将被隐藏</span>
          </label>
        </div>
        <div class="row">
          <div class="label">黑名单（每行一个关键词或域名片段）</div>
          <textarea id="rules" placeholder="例如：\nexample.com\n视频\n某些关键词"></textarea>
        </div>
      </div>
    </div>
    <script src="history_settings.js"></script>
  </body>
</html>
