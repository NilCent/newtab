<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>名言警句配置</title>
    <style>
      :root { --border: rgba(0,0,0,.08); --text: #1f2a37; --subtle: #6b7280; --primary:#3b82f6; --radius:12px; }
      *{box-sizing:border-box}
      body{margin:0;font-family:"Inter",system-ui,-apple-system,"PingFang SC","Segoe UI",Roboto,Arial,sans-serif;color:var(--text);background:linear-gradient(180deg,#f7fbff 0%,#eef5ff 100%);height:100vh;display:flex;flex-direction:column}
      .header{padding:12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,.9);backdrop-filter:blur(6px)}
      .title{font-weight:700}
      .actions{display:flex;gap:8px}
      .btn{border:1px solid var(--border);background:#fff;border-radius:10px;padding:8px 12px;font-weight:600;cursor:pointer}
      .btn[disabled]{opacity:.5;cursor:not-allowed}
      .main{flex:1;display:block;padding:12px;overflow:auto}
      .section{border:1px solid var(--border);border-radius:12px;background:rgba(255,255,255,.6);padding:12px;display:grid;gap:10px}
      .sep{border-top:2px dashed var(--border);margin:12px 0}
      .input{border:1px solid var(--border);border-radius:12px;padding:10px 12px;font-size:14px;width:100%}
      .row{display:grid;gap:8px}
      .list{display:grid;gap:8px}
      .item{display:grid;gap:6px;padding:10px;border:1px solid var(--border);border-radius:12px;background:#fff;position:relative}
      .item .meta{font-size:12px;color:var(--subtle);display:flex;justify-content:space-between}
      .item .del{position:absolute;top:6px;right:6px;width:20px;height:20px;border-radius:50%;border:0;background:#ef4444;color:#fff;font-weight:700;line-height:20px;text-align:center;display:none;cursor:pointer}
      .item.mark .del{display:block}
      .small{font-size:12px;color:var(--subtle)}
      .pager{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:8px}
      .primary{background:var(--primary);color:#fff;border-color:transparent}
    </style>
  </head>
  <body>
    <div class="header">
      <div class="title">名言警句配置</div>
      <div class="actions">
        <button id="close-panel" class="btn">关闭</button>
      </div>
    </div>
    <div class="main">
      <div class="section" id="add-section">
        <div class="row">
          <input id="new-text" class="input" placeholder="输入新的格言文本" />
          <input id="new-author" class="input" placeholder="作者（可选）" />
          <button id="add" class="btn primary">添加到数据集</button>
          <div class="small">当前数据集用于组件随机展示，可随时增删</div>
        </div>
      </div>
      <div class="sep"></div>
      <div class="section" id="search-section">
        <input id="search" class="input" placeholder="搜索格言或作者" />
      </div>
      <div class="sep"></div>
      <div class="section" id="dataset-section">
        <div id="list" class="list"></div>
        <div class="pager">
          <button id="prev" class="btn">上一页</button>
          <span id="page-info" class="small"></span>
          <button id="next" class="btn">下一页</button>
        </div>
      </div>
    </div>
    <script src="quote_settings.js"></script>
  </body>
 </html>
